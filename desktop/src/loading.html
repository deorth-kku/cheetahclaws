<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CheetahClaws</title>
  <style>
    html, body { height: 100%; margin: 0; }
    body {
      background: #0b0f14;
      color: #e6edf3;
      font: 15px/1.5 system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .wrap { text-align: center; }
    .spinner {
      width: 34px; height: 34px; margin: 0 auto 1rem;
      border: 3px solid #1f2933;
      border-top-color: #f0883e;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .title { font-weight: 600; letter-spacing: .2px; }
    .sub { color: #6b7682; font-size: 13px; margin-top: .25rem; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="spinner"></div>
    <div class="title">Starting CheetahClaws…</div>
    <div class="sub">launching the local server</div>
  </div>
</body>
</html>
